    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 260px));
    gap: 2.5rem 2rem;
    justify-content: center;
    max-width: 1200px;
    margin: 0 auto;

  figure svg { width: 100%; height: auto; display: block; }
  figcaption { margin-top: 0.9rem; font-size: 0.8rem; letter-spacing: 0.08em; }
  figcaption .prop { display: block; margin-top: 0.3rem; font-size: 0.68rem; color: var(--dim); }
</style>

<svg viewBox="0 0 240 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wren Cole — an empty frame" fill="none" stroke="#e8b45a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- the frame is most of what there is; wider gap, left edge -->
  <g stroke-width="1.1" opacity="0.5">
    <path d="M18 15.8 C 82 14.6, 156 16.4, 222 15.2"/>
    <path d="M222 15.2 C 223.2 100, 221.4 202, 222.4 285.6"/>
    <path d="M222.4 285.6 C 154 286.6, 88 284.8, 18.6 286.2"/>
    <path d="M18.6 286.2 C 17.8 258, 19 234, 18.2 212"/>
    <path d="M18.6 158 C 17.4 110, 19.2 60, 18 15.8"/>
  </g>
  <!-- five short pen strokes, where a face would begin -->
  <path d="M104 82 C 109 79.8, 115 80, 119 82" stroke-width="2.4"/>
  <path d="M112 84 C 111 91, 109 97, 107 101" stroke-width="2.3"/>
  <path d="M108 128 C 114 135, 122 139, 130 140" stroke-width="2.2"/>
  <path d="M142 104 C 148 101, 150 109, 145 114" stroke-width="2"/>
  <!-- the fifth, abandoned mid-stroke -->
  <path d="M100 116 C 103 118, 107 119, 110 119" stroke-width="2.3"/>
  <path d="M110 119 C 114 119, 117 118.4, 119 117.6" stroke-width="1.4" opacity="0.3"/>
  <path d="M120.5 117.2 L 122 116.8" stroke-width="1" opacity="0.15"/>
  <!-- where the pen stopped and pooled -->
  <ellipse cx="110" cy="119" rx="2.2" ry="1.4" fill="#e8b45a" fill-opacity="0.15" stroke="none"/>
</svg>
